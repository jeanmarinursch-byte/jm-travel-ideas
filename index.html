<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JM Travel">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM — Travel List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
  :root {
    --bg:        #0b160d;
    --bg2:       #111f13;
    --bg3:       #162419;
    --border:    #2a3d2c;
    --copper:    #b87333;
    --copper2:   #d4924d;
    --copper3:   #8a5625;
    --text:      #f0ebe0;
    --text2:     #9aaa9a;
    --text3:     #6b7d6b;
    --serif:     'Playfair Display', Georgia, serif;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PASSWORD SCREEN ── */
  #pw-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 2rem;
  }
  #pw-screen .monogram {
    font-family: var(--serif);
    font-size: 4rem;
    color: var(--copper);
    letter-spacing: 0.2em;
    line-height: 1;
  }
  #pw-screen .tagline {
    font-family: var(--serif);
    font-style: italic;
    color: var(--text2);
    font-size: 1rem;
    letter-spacing: 0.1em;
  }
  #pw-screen .divider {
    width: 60px; height: 1px;
    background: var(--copper3);
  }
  #pw-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    padding: 0.75rem 1.5rem;
    text-align: center;
    letter-spacing: 0.15em;
    outline: none;
    width: 240px;
    transition: border-color 0.2s;
  }
  #pw-input:focus { border-color: var(--copper); }
  #pw-input.shake {
    animation: shake 0.4s ease;
    border-color: #c0392b;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  #pw-error {
    color: #c0392b;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    min-height: 1rem;
  }
  .pw-btn {
    background: var(--copper);
    border: none;
    border-radius: 4px;
    color: var(--bg);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    padding: 0.75rem 2rem;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .pw-btn:hover { background: var(--copper2); }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    gap: 1rem;
    padding: 0 2rem;
    height: 60px;
  }
  .nav-btn {
    background: none; border: none;
    color: var(--text2); cursor: pointer;
    font-size: 1.1rem;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    display: flex; align-items: center; gap: 0.4rem;
    font-family: var(--sans);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-btn:hover { color: var(--copper); background: var(--bg2); }
  .nav-btn.hidden { visibility: hidden; pointer-events: none; }
  header h1 {
    flex: 1;
    text-align: center;
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  header h1 span { color: var(--copper); }
  .home-btn {
    background: none; border: none;
    color: var(--text2); cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--sans);
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .home-btn:hover { color: var(--copper); background: var(--bg2); }

  /* ── VIEWS ── */
  .view { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .view.active { display: block; }

  /* ── COUNTRY GRID ── */
  .page-title {
    font-family: var(--serif);
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .page-title em { color: var(--copper); font-style: italic; }
  .page-subtitle {
    color: var(--text2);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    margin-bottom: 2.5rem;
  }
  .copper-line {
    width: 40px; height: 2px;
    background: var(--copper);
    margin: 0.6rem 0 2rem;
  }

  .country-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    border: 1px solid var(--border);
  }
  .country-card {
    background: var(--bg2);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.2rem 1.4rem;
    text-align: left;
    transition: background 0.15s;
    position: relative;
  }
  .country-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--copper);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .country-card:hover { background: var(--bg3); }
  .country-card:hover::after { transform: scaleX(1); }
  .country-card .flag {
    font-size: 1.8rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .country-card .info .name {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 0.2rem;
  }
  .country-card .info .count {
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 0.05em;
  }
  .priority-section {
    margin-bottom: 1px;
  }
  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--copper3);
    padding: 1.5rem 0 0.6rem;
  }

  /* ── COUNTRY VIEW ── */
  .country-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.4rem;
  }
  .country-flag-lg { font-size: 2.8rem; line-height: 1; }
  .entry-count-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--copper);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.8rem;
  }

  /* MAP */
  #map-container {
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 380px;
    margin: 1.5rem 0;
    overflow: hidden;
    position: relative;
  }
  #map { height: 100%; width: 100%; background: var(--bg); }

  /* SVG country map markers */
  .city-dot {
    fill: var(--copper);
    stroke: var(--copper2);
    stroke-width: 1.5;
    transition: r 0.1s, fill 0.1s;
  }
  .city-label {
    fill: var(--text);
    font-family: var(--serif);
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    transition: fill 0.1s;
  }
  .city-marker { cursor: pointer; }
  /* City list below map */
  .cities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    border: 1px solid var(--border);
    margin-top: 1.5rem;
  }
  .city-card {
    background: var(--bg2);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem;
    transition: background 0.15s;
  }
  .city-card:hover { background: var(--bg3); color: var(--copper); }
  .city-card .city-name {
    font-family: var(--serif);
    font-size: 0.95rem;
    color: var(--text);
  }
  .city-card:hover .city-name { color: var(--copper); }
  .city-card .city-count {
    font-size: 0.75rem;
    color: var(--text3);
  }
  .city-card .arrow { color: var(--text3); font-size: 0.8rem; }

  /* ── CATEGORY VIEW ── */
  .cat-section { margin-bottom: 2.5rem; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .cat-icon { font-size: 1.2rem; }
  .cat-title {
    font-family: var(--serif);
    font-size: 1.15rem;
    color: var(--copper);
    font-weight: 400;
  }
  .cat-count { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.05em; }

  .entries-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .entry-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--copper3);
    border-radius: 0 4px 4px 0;
    padding: 0.8rem 1rem;
    transition: border-left-color 0.15s, background 0.15s;
  }
  .entry-card:hover {
    border-left-color: var(--copper);
    background: var(--bg3);
  }
  .entry-name {
    font-family: var(--serif);
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .entry-details {
    font-size: 0.8rem;
    color: var(--text2);
    line-height: 1.5;
  }
  .entry-hours-btn {
    background: none; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text3); font-size: 0.68rem; padding: 2px 7px;
    cursor: pointer; margin-top: 0.4rem; display: inline-flex;
    align-items: center; gap: 0.3rem; transition: color 0.15s, border-color 0.15s;
  }
  .entry-hours-btn:hover { color: var(--copper); border-color: var(--copper3); }
  .entry-hours {
    margin-top: 0.45rem; font-size: 0.75rem; line-height: 1.6;
    border-top: 1px solid var(--border); padding-top: 0.4rem;
  }
  .entry-hours-row { display: flex; gap: 0.4rem; align-items: baseline; }
  .entry-hours-label { color: var(--copper3); font-size: 0.68rem; min-width: 52px; }
  .entry-hours-val { color: var(--text2); }
  .entry-hours-closed { color: #c0392b; }
  .entry-hours-note { color: var(--text3); font-style: italic; margin-top: 0.2rem; font-size: 0.7rem; }
  .entry-hours-disclaimer { color: var(--text3); font-size: 0.65rem; margin-top: 0.3rem; }
  .city-context {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--copper3);
    margin-bottom: 0.25rem;
  }


  /* ── SEASONAL SECTION ── */
  #seasonal-section { margin: 1.5rem 0 0; }
  .seasonal-header {
    display: flex; align-items: center; gap: 0.8rem;
    font-family: var(--serif); font-size: 1.15rem; font-weight: 400;
    color: var(--copper);
    padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    margin-bottom: 0.8rem;
  }
  /* 2-column grid for monthly city data */
  .seasonal-grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(6, auto);
    grid-auto-flow: column;
  }
  .seasonal-cell {
    display: flex; gap: 0.6rem; align-items: flex-start;
    padding: 0.48rem 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .seasonal-grid-2col .seasonal-cell:nth-child(6),
  .seasonal-grid-2col .seasonal-cell:nth-child(12) { border-bottom: none; }
  .seasonal-month {
    white-space: nowrap; color: var(--copper); font-family: var(--serif);
    font-size: 0.82rem; font-weight: 600; min-width: 36px; padding-right: 0.4rem;
  }
  .seasonal-cities { color: var(--text2); font-size: 0.78rem; line-height: 1.5; }
  /* fallback table for non-monthly seasonal data */
  .seasonal-table { width: 100%; border-collapse: collapse; }
  .seasonal-table tr { border-bottom: 1px solid var(--border); }
  .seasonal-table tr:last-child { border-bottom: none; }
  .seasonal-table td { padding: 0.55rem 0.5rem; vertical-align: top; }

  /* ── HIGHLIGHTS SECTION ── */
  #highlights-section { margin: 0.5rem 0 0; }
  #local-foods-section { margin: 1rem 0 0; }
  .highlights-header {
    display: flex; align-items: center; gap: 0.8rem;
    font-family: var(--serif); font-size: 1.15rem; font-weight: 400;
    color: var(--copper);
    padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    margin-bottom: 0.8rem;
  }
  .highlights-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .highlight-card {
    position: relative; overflow: hidden; border-radius: 3px;
    border: 1px solid var(--border); cursor: pointer;
    height: 140px; text-align: left;
    transition: border-color 0.2s, transform 0.2s;
    background: var(--bg2);
  }
  .highlight-card:hover { border-color: var(--copper3); transform: translateY(-2px); }
  .highlight-card-nolink:hover { border-color: var(--border); transform: none; }
  .highlight-card-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 0.35s ease;
  }
  .highlight-card:hover .highlight-card-bg { transform: scale(1.06); }
  .highlight-card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 55%, transparent 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0.65rem 0.8rem;
  }
  .highlight-card-nolink:hover { border-color: var(--border); transform: none; }

  /* ── LOCAL FOODS TO TRY ── */
  #local-foods-section { margin-bottom: 1.6rem; }
  .local-foods-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .local-food-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    padding: 0.75rem 0.9rem;
  }
  .local-food-name {
    font-family: var(--serif); font-size: 0.85rem; color: var(--copper2);
    margin-bottom: 0.3rem;
  }
  .local-food-desc {
    font-size: 0.75rem; color: var(--text2); line-height: 1.5;
  }


  /* ── BEST BARS SECTION ── */
  #best-bars-section { margin: 1rem 0 1rem 0; }
  .best-bars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
  }
  .bar-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    padding: 0.75rem 0.9rem;
  }
  .bar-card-header {
    display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 0.35rem;
  }
  .bar-name {
    font-family: var(--serif); font-size: 0.88rem; color: var(--copper2); flex: 1;
  }
  .bar-rank {
    font-size: 0.68rem; color: var(--copper3); white-space: nowrap;
    background: rgba(176,135,89,0.12); border: 1px solid rgba(176,135,89,0.25);
    border-radius: 2px; padding: 1px 5px; flex-shrink: 0;
  }
  .bar-city {
    font-size: 0.7rem; color: var(--text3); margin-bottom: 0.3rem; letter-spacing: 0.04em;
  }
  .bar-drink {
    font-size: 0.74rem; color: var(--text2); line-height: 1.5;
  }
  .bar-drink::before { content: '🍸 '; }


  /* ── SECTION BLOCKS ── */
  .section-block {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    margin-top: 1.8rem;
    gap: 0;
  }
  .section-content {
    flex: 1;
    min-width: 0;
    padding-left: 1.1rem;
  }
  .section-banner {
    width: 36px;
    flex-shrink: 0;
    position: sticky;
    top: 68px;
    align-self: flex-start;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    min-height: 80px;
  }
  .banner-text {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: var(--serif);
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    white-space: nowrap;
    padding: 1.2rem 0;
    text-transform: uppercase;
  }
  /* L'Aperçu — copper fill */
  .banner-apercu {
    background: var(--copper);
  }
  .banner-apercu .banner-text { color: var(--bg); }
  /* La Recherche — same copper fill */
  .banner-recherche {
    background: var(--copper);
  }
  .banner-recherche .banner-text { color: var(--bg); }
  /* Le Carnet de Bord — same copper fill */
  .banner-carnet {
    background: var(--copper);
  }
  .banner-carnet .banner-text { color: var(--bg); }

  /* ── CARNET SUB-SECTIONS ── */
  .carnet-subsection { margin-bottom: 1.4rem; }
  .carnet-subheader {
    display: flex; align-items: center; gap: 0.7rem;
    font-family: var(--serif); font-size: 1.05rem; font-weight: 400;
    color: var(--copper3);
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.6rem;
  }
  .carnet-empty {
    font-size: 0.76rem; color: var(--text3);
    font-style: italic; padding: 0.5rem 0;
    letter-spacing: 0.04em;
  }


  /* 2×2 seasons grid (Japan) */
  .seasonal-grid-seasons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .season-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    padding: 0.75rem 0.9rem;
  }
  .season-card-header {
    font-family: var(--serif); font-size: 0.88rem; color: var(--copper2);
    margin-bottom: 0.35rem; display: flex; align-items: baseline; gap: 0.4rem;
  }
  .season-months {
    font-size: 0.7rem; color: var(--text3); font-family: var(--sans);
  }
  .season-note {
    font-size: 0.7rem; color: var(--text3); margin-top: 0.3rem;
    font-style: italic;
  }


  /* ── COUNTRY HEADER (centered, flags both sides) ── */
  .country-header-centered {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.4rem 2rem 1rem;
    text-align: center;
  }
  .c-flag-side {
    font-size: 2rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .c-title-wrap { display: flex; flex-direction: column; align-items: center; }
  .page-title-row {
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  .page-title-lg {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 400;
    color: var(--text1);
    letter-spacing: 0.06em;
    line-height: 1.1;
  }
  .page-subtitle-inline {
    font-size: 0.85rem;
    color: var(--text3);
    font-family: var(--sans);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* ── HIGHLIGHT MODAL ── */
  .hl-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .hl-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    max-width: 520px; width: 100%; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    animation: hl-in 0.18s ease;
  }
  @keyframes hl-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .hl-photo {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    display: block; background: var(--bg3);
  }
  .hl-photo-placeholder {
    width: 100%; aspect-ratio: 16/9; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 2rem;
  }
  .hl-body { padding: 1.2rem 1.4rem 1.4rem; }
  .hl-location {
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--copper3); margin-bottom: 0.35rem;
  }
  .hl-name {
    font-family: var(--serif); font-size: 1.25rem; color: var(--text);
    margin-bottom: 0.75rem; line-height: 1.3;
  }
  .hl-desc {

// ── User-added entries persistence ───────────────────────────────────────
const USER_ENTRIES_KEY = 'jm_travel_entries';

function getUserEntries() {
  try { return JSON.parse(localStorage.getItem(USER_ENTRIES_KEY) || '[]'); } catch { return []; }
}

function persistUserEntry(item) {
  const entries = getUserEntries();
  entries.push(item);
  localStorage.setItem(USER_ENTRIES_KEY, JSON.stringify(entries));
}

function mergeUserEntries() {
  getUserEntries().forEach(item => _insertIntoTravel(item));
}

function migrateInbox() {
  const INBOX_KEY = 'jm_travel_inbox';
  try {
    const items = JSON.parse(localStorage.getItem(INBOX_KEY) || '[]');
    if (items.length > 0) {
      items.forEach(item => _insertIntoTravel(item));
      localStorage.removeItem(INBOX_KEY);
    }
  } catch (_) {}
}

function deduplicateTravel() {
  Object.values(TRAVEL).forEach(country => {
    country.cities.forEach(city => {
      Object.keys(city.categories).forEach(cat => {
        const deduped = [];
        city.categories[cat].forEach(entry => {
          const existing = deduped.find(e => _namesMatch(e.name, entry.name));
          if (existing) {
            if (entry.details && entry.details !== existing.details) {
              existing.details = [existing.details, entry.details].filter(Boolean).join(' · ');
            }
          } else {
            deduped.push(entry);
          }
        });
        city.categories[cat] = deduped;
      });
    });
  });
}

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  const inp = document.getElementById('pw-input');
  if (val === PASSWORD) {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    migrateInbox();
    mergeUserEntries();
    deduplicateTravel();
    showHome();
  } else {
    err.textContent = 'Incorrect password';
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
    inp.value = '';
    inp.focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ── NAV ──
function setHeader(title, showBack, showHome) {
  document.getElementById('header-title').innerHTML = title;
  document.getElementById('back-btn').classList.toggle('hidden', !showBack);
  document.getElementById('home-btn').classList.toggle('hidden', !showHome);
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() {
  history = [];
  setHeader('JM — <span>Bon Vent</span>', false, false);
  showView('view-home');
}

function goBack() {
  if (history.length === 0) return showHome();
  const prev = history.pop();
  if (prev.type === 'home') showHome();
  else if (prev.type === 'country') showCountry(prev.country, false);
}

// ── HOME ──
function countryEntries(country) {
  const d = TRAVEL[country];
  let n = 0;
  d.cities.forEach(c => Object.values(c.categories).forEach(arr => n += arr.length));
  return n;
}

function buildHome() {
  const pGrid = document.getElementById('grid-priority');
  const cGrid = document.getElementById('grid-countries');
  pGrid.innerHTML = '';
  cGrid.innerHTML = '';

  const all = Object.keys(TRAVEL);
  const priority = PRIORITY.filter(p => all.includes(p));
  const rest = all.filter(k => !PRIORITY.includes(k)).sort();

  priority.forEach(c => pGrid.appendChild(makeCard(c)));
  rest.forEach(c => cGrid.appendChild(makeCard(c)));
}

function makeCard(country) {
  const d = TRAVEL[country];
  const n = countryEntries(country);
  const card = document.createElement('button');
  card.className = 'country-card';
  card.innerHTML = `
    <div class="flag">${d.flag}</div>
    <div class="info">
      <div class="name">${country}</div>
      <div class="count">${n} place${n !== 1 ? 's' : ''}</div>
    </div>`;
  card.onclick = () => {
    history.push({type:'home'});
    showCountry(country);
  };
  return card;
}

async function getWorldTopo() {
  if (worldTopoCache) return worldTopoCache;
  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  worldTopoCache = await res.json();
  return worldTopoCache;
}

  setHeader('', true, true);

  const isHome = PRIORITY.includes(country);

  if (isHome) {
    document.getElementById('map-container').style.display = 'none';
    document.getElementById('cities-list').style.display = 'none';
    document.getElementById('seasonal-section').innerHTML = '';
    showView('view-country');
    // Render highlights and local foods BEFORE categories so they appear above them
    renderHighlightsSection(country);
    renderLocalFoodsSection(country);
    renderBestBarsSection(country);
    renderCarnetSection(country);
    const merged = {};
    d.cities.forEach(city => {
      CAT_ORDER.forEach(cat => {
        if (city.categories[cat]) {
          merged[cat] = merged[cat] || [];
          merged[cat].push(...city.categories[cat]);
        }
      });
    });
    showCategories(country, null, merged, true);
    return;
  }

  // Remove leftover categories from HK/NY views
  document.getElementById('view-country').querySelectorAll('.categories-inline').forEach(el => el.remove());

  document.getElementById('map-container').style.display = 'block';
  document.getElementById('cities-list').style.display = 'none';
  document.getElementById('seasonal-section').innerHTML = '';
  document.getElementById('highlights-section').innerHTML = '';
  document.getElementById('local-foods-section').innerHTML = '';
  document.getElementById('best-bars-section').innerHTML = '';
  document.getElementById('carnet-section').innerHTML = '';
  showView('view-country');
  renderCountrySVG(country);
  renderSeasonalSection(country);
  renderHighlightsSection(country);
  renderLocalFoodsSection(country);
  renderBestBarsSection(country);
  renderCarnetSection(country);
}

async function renderCountrySVG(country) {
  const container = document.getElementById('map');
  container.innerHTML = `<div style="color:var(--text3);padding:2rem;font-size:0.8rem;text-align:center;letter-spacing:0.1em">Loading…</div>`;
  container.style.position = 'relative';
  const cityList = document.getElementById('cities-list');
  cityList.innerHTML = '';
  cityList.style.display = 'none';

  try {
    const world = await getWorldTopo();
    const isoCode = COUNTRY_ISO[country];
    const allFeatures = topojson.feature(world, world.objects.countries).features;
    const countryFeature = allFeatures.find(f => +f.id === isoCode);
    if (!countryFeature) { container.innerHTML = ''; buildCityListOnly(country); return; }

    const d = TRAVEL[country];
    const mappableCities = d.cities.filter(c =>
      c.coords && c.name !== 'General' && c.name !== 'Multiple cities' && c.name !== 'Multiple'
    );

    const W = container.clientWidth || 700;
    const H = 360;
    container.innerHTML = '';
    const svgNS = 'http://www.w3.org/2000/svg';

    // ── Bbox & island split logic ──
    const bbox = COUNTRY_BBOX[country];
    const useInset = bbox && ISLAND_INSET_COUNTRIES.has(country); // show inset box only for Spain/USA

    // For ANY country with a bbox: split MultiPolygon into in-bbox (mainland) vs out-of-bbox (remote islands).
    // This prevents outlying territories (Svalbard for Norway, etc.) from breaking geoPath.
    let mainlandFeature = countryFeature;
    let islandFeature = null;
    if (bbox && countryFeature.geometry.type === 'MultiPolygon') {
      const BUF = 3; // degrees buffer around bbox
      const mainlandPolys = [], islandPolys = [];
      for (const poly of countryFeature.geometry.coordinates) {
        const ring = poly[0];
        const cx = ring.reduce((s,p) => s + p[0], 0) / ring.length;
        const cy = ring.reduce((s,p) => s + p[1], 0) / ring.length;
        const inside = cx >= bbox[0]-BUF && cx <= bbox[2]+BUF && cy >= bbox[1]-BUF && cy <= bbox[3]+BUF;
        (inside ? mainlandPolys : islandPolys).push(poly);
      }
      if (mainlandPolys.length > 0) {
        mainlandFeature = { type:'Feature', geometry:{ type:'MultiPolygon', coordinates: mainlandPolys }, properties:{} };
      }
      if (islandPolys.length > 0) {
        islandFeature = { type:'Feature', geometry:{ type:'MultiPolygon', coordinates: islandPolys }, properties:{} };
      }
    }

    // ── Main projection ──
    const projection = d3.geoMercator();

    // Fit to mainlandFeature if split succeeded (guaranteed valid coords from topojson),
    // otherwise fall back to a bbox rectangle or the full country.
    if (bbox && mainlandFeature !== countryFeature) {
      // Use actual mainland shape — avoids any synthetic bbox issues
      projection.fitExtent([[24, 24], [W-24, H-24]], mainlandFeature);
    } else if (bbox) {
      // Proper GeoJSON structure (properties at Feature level, not geometry level)
      projection.fitExtent([[24, 24], [W-24, H-24]], {
        type: 'Feature', properties: {},
        geometry: {
          type: 'Polygon',
          coordinates: [[[bbox[0],bbox[1]],[bbox[2],bbox[1]],[bbox[2],bbox[3]],[bbox[0],bbox[3]],[bbox[0],bbox[1]]]]
        }
      });
    } else {
      projection.fitExtent([[24, 24], [W-24, H-24]], countryFeature);
    }

    // Sanity-check: if fitExtent produced NaN (e.g. empty geometry), fall back
    if (isNaN(projection.scale()) || projection.scale() === 0) {
      projection.fitExtent([[24, 24], [W-24, H-24]], countryFeature);
    }

    const geoPath = d3.geoPath().projection(projection);

    // ── SVG with three groups ──
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.style.cssText = 'background:var(--bg);display:block;cursor:default;';

    const mapG = document.createElementNS(svgNS, 'g');
    const cityG = document.createElementNS(svgNS, 'g');
    svg.appendChild(mapG);
    svg.appendChild(cityG);

    // Draw mainland outline. Use mainlandFeature whenever the split succeeded (any bbox country);
    // this avoids projecting remote territories like Svalbard that break geoPath.
    const outlineFeature = (mainlandFeature !== countryFeature) ? mainlandFeature : countryFeature;
    const outline = document.createElementNS(svgNS, 'path');
    outline.setAttribute('d', geoPath(outlineFeature) || geoPath(countryFeature) || '');
    outline.setAttribute('fill', 'var(--bg3)');
    outline.setAttribute('stroke', 'var(--copper3)');
    outline.setAttribute('stroke-width', '1.5');
    outline.setAttribute('stroke-linejoin', 'round');
    mapG.appendChild(outline);

    // ── Island inset box (bottom-right corner) ──
    let insetProjection = null;
    let insetG = null;
    const INSET_W = 160, INSET_H = 105;
    const INSET_PAD = 10;
    const insetX = W - INSET_W - INSET_PAD;
    const insetY = H - INSET_H - INSET_PAD;

    if (useInset && islandFeature) {
      insetProjection = d3.geoMercator().fitExtent(
        [[insetX + 6, insetY + 18], [insetX + INSET_W - 6, insetY + INSET_H - 6]],
        islandFeature
      );
      const insetPath = d3.geoPath().projection(insetProjection);

      insetG = document.createElementNS(svgNS, 'g');
      svg.appendChild(insetG);

      // Inset background box
      const insetRect = document.createElementNS(svgNS, 'rect');
      insetRect.setAttribute('x', insetX);
      insetRect.setAttribute('y', insetY);
      insetRect.setAttribute('width', INSET_W);
      insetRect.setAttribute('height', INSET_H);
      insetRect.setAttribute('fill', 'var(--bg2)');
      insetRect.setAttribute('stroke', 'var(--border)');
      insetRect.setAttribute('stroke-width', '1');
      insetRect.setAttribute('rx', '3');
      insetG.appendChild(insetRect);

      // Inset label
      const insetLabel = document.createElementNS(svgNS, 'text');
      insetLabel.setAttribute('x', insetX + INSET_W / 2);
      insetLabel.setAttribute('y', insetY + 13);
      insetLabel.setAttribute('text-anchor', 'middle');
      insetLabel.setAttribute('fill', 'var(--copper3)');
      insetLabel.setAttribute('font-size', '9');
      insetLabel.setAttribute('letter-spacing', '0.08em');
      insetLabel.setAttribute('font-family', 'var(--serif)');
      insetLabel.textContent = country === 'Spain' ? 'CANARY ISLANDS' : 'ISLANDS';
      insetG.appendChild(insetLabel);

      // Island outlines
      const islandOutline = document.createElementNS(svgNS, 'path');
      islandOutline.setAttribute('d', insetPath(islandFeature));
      islandOutline.setAttribute('fill', 'var(--bg3)');
      islandOutline.setAttribute('stroke', 'var(--copper3)');
      islandOutline.setAttribute('stroke-width', '1');
      islandOutline.setAttribute('stroke-linejoin', 'round');
      insetG.appendChild(islandOutline);
    }

    // ── Split cities into mainland vs island ──
    const CHAR_W = 7, DOT_R = 5, DOT_GAP = 9;

    function isMainlandCoords(coords) {
      if (!bbox || !useInset) return true;
      const [lat, lon] = coords; // coords stored as [lat, lon]
      const BUF = 4;
      return lon >= bbox[0]-BUF && lon <= bbox[2]+BUF && lat >= bbox[1]-BUF && lat <= bbox[3]+BUF;
    }

    const mainlandCities = mappableCities.filter(c => isMainlandCoords(c.coords));
    const islandCities = useInset ? mappableCities.filter(c => !isMainlandCoords(c.coords)) : [];

    // ── Build mainland marker elements ──
    const cityData = mainlandCities.map(city => {
      const pt = projection([city.coords[1], city.coords[0]]);
      if (!pt) return null;
      const [projX, projY] = pt;
      if (projX < -80 || projY < -80 || projX > W + 80 || projY > H + 80) return null;
      const lw = city.name.length * CHAR_W;
      const rightSide = (projX + DOT_GAP + lw) < W - 6;
      return { city, projX, projY, lw, rightSide };
    }).filter(Boolean);

    const markers = cityData.map(({ city, projX, projY, lw, rightSide }) => {
      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('class', 'city-marker');
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('r', String(DOT_R));
      circle.setAttribute('class', 'city-dot');
      const text = document.createElementNS(svgNS, 'text');
      text.setAttribute('class', 'city-label');
      if (!rightSide) text.setAttribute('text-anchor', 'end');
      text.textContent = city.name;
      const hit = document.createElementNS(svgNS, 'rect');
      hit.setAttribute('width', DOT_GAP + lw + DOT_R + 4);
      hit.setAttribute('height', 24);
      hit.setAttribute('fill', 'transparent');
      g.appendChild(circle); g.appendChild(text); g.appendChild(hit);
      g.addEventListener('mouseenter', () => { circle.setAttribute('r','7'); circle.setAttribute('fill','var(--copper2)'); text.setAttribute('fill','var(--copper2)'); });
      g.addEventListener('mouseleave', () => { circle.setAttribute('r',String(DOT_R)); circle.setAttribute('fill','var(--copper)'); text.setAttribute('fill','var(--text)'); });
      g.addEventListener('click', () => navigateToCity(country, city.name));
      cityG.appendChild(g);
      return { circle, text, hit, projX, projY, rightSide, lw };
    });

    // ── Build island marker elements (fixed, in insetG) ──
    if (insetG && insetProjection && islandCities.length > 0) {
      islandCities.forEach(city => {
        const pt = insetProjection([city.coords[1], city.coords[0]]);
        if (!pt) return;
        const [sx, sy] = pt;
        const g = document.createElementNS(svgNS, 'g');
        g.setAttribute('class', 'city-marker');
        const circle = document.createElementNS(svgNS, 'circle');
        circle.setAttribute('cx', sx); circle.setAttribute('cy', sy);
        circle.setAttribute('r', '4'); circle.setAttribute('class', 'city-dot');
        const lw = city.name.length * CHAR_W;
        const rightSide = (sx + DOT_GAP + lw) < insetX + INSET_W - 4;
        const text = document.createElementNS(svgNS, 'text');
        text.setAttribute('x', rightSide ? sx + 7 : sx - 7);
        text.setAttribute('y', sy + 3);
        text.setAttribute('class', 'city-label');
        text.setAttribute('font-size', '10');
        if (!rightSide) text.setAttribute('text-anchor', 'end');
        text.textContent = city.name;
        const hit = document.createElementNS(svgNS, 'rect');
        hit.setAttribute('x', rightSide ? sx - 4 : sx - 7 - lw); hit.setAttribute('y', sy - 10);
        hit.setAttribute('width', 7 + lw + 4); hit.setAttribute('height', 20);
        hit.setAttribute('fill', 'transparent');
        g.appendChild(circle); g.appendChild(text); g.appendChild(hit);
        g.addEventListener('mouseenter', () => { circle.setAttribute('r','6'); circle.setAttribute('fill','var(--copper2)'); text.setAttribute('fill','var(--copper2)'); });
        g.addEventListener('mouseleave', () => { circle.setAttribute('r','4'); circle.setAttribute('fill','var(--copper)'); text.setAttribute('fill','var(--text)'); });
        g.addEventListener('click', () => navigateToCity(country, city.name));
        insetG.appendChild(g);
      });
    }

    // ── Position mainland markers at a given zoom transform ──
    function positionMarkers(t) {
      markers.forEach(({ circle, text, hit, projX, projY, rightSide, lw }) => {
        const sx = t.applyX(projX);
        const sy = t.applyY(projY);
        circle.setAttribute('cx', sx);
        circle.setAttribute('cy', sy);
        text.setAttribute('x', rightSide ? sx + DOT_GAP : sx - DOT_GAP);
        text.setAttribute('y', sy + 4);
        hit.setAttribute('x', rightSide ? sx - DOT_R : sx - DOT_GAP - lw - 2);
        hit.setAttribute('y', sy - 12);
      });
    }

    positionMarkers(d3.zoomIdentity);
    container.appendChild(svg);

    // ── D3 zoom (mainland only) ──
    const zoom = d3.zoom()
      .scaleExtent([0.5, 10])
      .on('zoom', evt => {
        mapG.setAttribute('transform', evt.transform.toString());
        outline.setAttribute('stroke-width', String(1.5 / evt.transform.k));
        positionMarkers(evt.transform);
      });
    d3.select(svg).call(zoom);

    // Zoom buttons
    const zoomBtns = document.createElement('div');
    zoomBtns.style.cssText = 'position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:3px;z-index:2;';
    const btnCSS = 'background:var(--bg2);border:1px solid var(--border);color:var(--copper);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:background 0.1s;font-size:0.95rem;';
    [
      ['+', () => d3.select(svg).transition().duration(250).call(zoom.scaleBy, 1.6), 'Zoom in'],
      ['−', () => d3.select(svg).transition().duration(250).call(zoom.scaleBy, 1/1.6), 'Zoom out'],
      ['⊙', () => d3.select(svg).transition().duration(300).call(zoom.transform, d3.zoomIdentity), 'Reset'],
    ].forEach(([label, fn, title]) => {
      const btn = document.createElement('button');
      btn.style.cssText = btnCSS + (label === '⊙' ? 'font-size:0.7rem;' : '');
      btn.title = title; btn.textContent = label;
      btn.addEventListener('click', fn);
      btn.addEventListener('mouseenter', () => btn.style.background = 'var(--bg3)');
      btn.addEventListener('mouseleave', () => btn.style.background = 'var(--bg2)');
      zoomBtns.appendChild(btn);
    });
    container.appendChild(zoomBtns);

    // Cities without coordinates → city cards below the map
    const unmapped = d.cities.filter(c =>
      !c.coords || c.name === 'General' || c.name === 'Multiple cities' || c.name === 'Multiple'
    );
    const cityList2 = document.getElementById('cities-list');
    cityList2.innerHTML = '';
    if (unmapped.length > 0) {
      cityList2.style.display = 'grid';
      unmapped.forEach(c => {
        const n = Object.values(c.categories).reduce((s,a)=>s+a.length,0);
        const label = c.name === 'General' ? 'Country-wide picks' : c.name === 'Multiple' || c.name === 'Multiple cities' ? 'Multiple cities' : c.name;
        const card = document.createElement('button');
        card.className = 'city-card';
        card.innerHTML = `<span class="city-name">${label}</span><span class="city-count">${n} places</span><span class="arrow">→</span>`;
        card.addEventListener('click', () => navigateToCity(country, c.name));
        cityList2.appendChild(card);
      });
    } else {
      cityList2.style.display = 'none';
    }

  } catch(e) {
    console.error('SVG map error:', e);
    container.innerHTML = '';
    buildCityListOnly(country);
  }
}

function buildCityListOnly(country) {
  // Fallback: show city grid if SVG fails
  const d = TRAVEL[country];
  const list = document.getElementById('cities-list');
  list.style.display = 'grid';
  list.innerHTML = '';
  d.cities.forEach(city => {
    const n = Object.values(city.categories).reduce((s,a)=>s+a.length,0);
    const card = document.createElement('button');
    card.className = 'city-card';
    card.innerHTML = `<span class="city-name">${city.name}</span><span class="city-count">${n}</span><span class="arrow">→</span>`;
    card.onclick = () => navigateToCity(country, city.name);
    list.appendChild(card);
  });
}

function renderSeasonalSection(country) {
  const sec = document.getElementById('seasonal-section');
  const d = TRAVEL[country];

  // ── China: 2-column × 6-row grid (Jan–Jun left, Jul–Dec right) ──
  if (country === 'China') {
    const cells = CHINA_MONTHLY.map(({month, cities}) =>
      `<div class="seasonal-cell">
        <div class="seasonal-month">${month.slice(0,3)}</div>
        <div class="seasonal-cities">${cities.join(' · ')}</div>
      </div>`
    ).join('');
    sec.innerHTML = `
      <div class="seasonal-header">🗓 Best Cities by Month</div>
      <div class="seasonal-grid-2col">${cells}</div>`;
    return;
  }


  // ── Japan: 2×2 seasonal grid ──
  if (country === 'Japan') {
    const cells = JAPAN_SEASONS.map(s => `
      <div class="season-card">
        <div class="season-card-header">${s.icon} ${s.season} <span class="season-months">${s.months}</span></div>
        <div class="seasonal-cities">${s.cities.join(' · ')}</div>
        <div class="season-note">${s.note}</div>
      </div>`).join('');
    sec.innerHTML = `
      <div class="seasonal-header">🗓 Best Season to Visit</div>
      <div class="seasonal-grid-seasons">${cells}</div>`;
    return;
  }

  if (!d.seasonal || d.seasonal.length === 0) { sec.innerHTML = ''; return; }

  const MONTH_SHORT = {
    january:'January', february:'February', march:'March', april:'April',
    may:'May', june:'June', july:'July', august:'August',
    september:'September', october:'October', november:'November', december:'December',
    summer:'Summer', winter:'Winter', spring:'Spring', autumn:'Autumn', fall:'Autumn'
  };
  function monthLabel(label) {
    const t = label.toLowerCase();
    for (const [key, val] of Object.entries(MONTH_SHORT)) {
      if (t.includes(key)) return val;
    }
    return label;
  }

  let rows = '';
  d.seasonal.forEach(s => {
    const lbl = monthLabel(s.label);
    const txt = s.text || '';
    rows += `<tr>
      <td class="seasonal-month">${lbl}</td>
      <td class="seasonal-cities">${txt}</td>
    </tr>`;
  });

  sec.innerHTML = `
    <div class="seasonal-header">🗓 Best by Season / Month</div>
    <table class="seasonal-table"><tbody>${rows}</tbody></table>`;
}

// ── HIGHLIGHT MODAL ──
const _wikiCache = {};

async function showHighlightModal(wikiTitle, displayName, cityName) {
  // Build or reuse modal element
  let modal = document.getElementById('hl-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'hl-modal';
    modal.className = 'hl-overlay';
    modal.innerHTML = `
      <div class="hl-card">
        <div id="hl-img-wrap"></div>
        <div class="hl-body">
          <div class="hl-location" id="hl-location"></div>
          <div class="hl-name" id="hl-name"></div>
          <div class="hl-desc" id="hl-desc">Loading…</div>
          <div class="hl-footer">
            <a class="hl-wiki-link" id="hl-link" href="#" target="_blank" rel="noopener">Wikipedia →</a>
            <button class="hl-close" onclick="closeHighlightModal()">Close</button>
          </div>
        </div>
      </div>`;
    modal.addEventListener('click', e => { if (e.target === modal) closeHighlightModal(); });
    document.body.appendChild(modal);
  }

  // Populate with loading state
  document.getElementById('hl-name').textContent = displayName;
  document.getElementById('hl-location').textContent = cityName;
  document.getElementById('hl-desc').textContent = 'Loading…';
  document.getElementById('hl-img-wrap').innerHTML = '<div class="hl-photo-placeholder">🌍</div>';
  document.getElementById('hl-link').href = `https://en.wikipedia.org/wiki/${encodeURIComponent(wikiTitle)}`;
  modal.style.display = 'flex';

  // Fetch from Wikipedia REST API (cached)
  if (!_wikiCache[wikiTitle]) {
    try {
      const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
      _wikiCache[wikiTitle] = r.ok ? await r.json() : null;
    } catch(e) { _wikiCache[wikiTitle] = null; }
  }

  const data = _wikiCache[wikiTitle];
  if (!data) {
    document.getElementById('hl-desc').textContent = 'Description not available.';
    return;
  }

  // Truncate extract to ~3 sentences
  const raw = data.extract || '';
  const sentenceEnd = /(?<=[.!?])\s+(?=[A-Z])/g;
  const parts = raw.split(sentenceEnd);
  document.getElementById('hl-desc').textContent = parts.slice(0, 3).join(' ');
  document.getElementById('hl-link').href = data.content_urls?.desktop?.page || document.getElementById('hl-link').href;

  // Photo
  const imgWrap = document.getElementById('hl-img-wrap');
  if (data.thumbnail?.source) {
    // Request a larger version by bumping the pixel width in the URL
    const src = data.thumbnail.source.replace(/\/\d+px-/, '/800px-');
    const img = document.createElement('img');
    img.className = 'hl-photo';
    img.alt = displayName;
    img.onerror = () => {
      // Upscaled URL failed — fall back to original thumbnail size
      if (img.src !== data.thumbnail.source) {
        img.src = data.thumbnail.source;
      } else {
        imgWrap.innerHTML = '<div class="hl-photo-placeholder">🌍</div>';
      }
    };
    img.src = src;
    imgWrap.innerHTML = '';
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = '<div class="hl-photo-placeholder">🌍</div>';
  }
}

function closeHighlightModal() {
  const m = document.getElementById('hl-modal');
  if (m) m.style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeHighlightModal(); });

// ── CATEGORIES VIEW ──
function showCategories(country, cityName, categories, isHomeDest=false) {
  const d = TRAVEL[country];
  const total = Object.values(categories).reduce((s,a)=>s+a.length,0);

  document.getElementById('city-name').textContent = cityName || country;
  document.getElementById('city-subtitle').textContent = isHomeDest
    ? `${d.flag} ${total} place${total!==1?'s':''}`
    : `${d.flag} ${country} · ${total} place${total!==1?'s':''}`;

  setHeader(`${d.flag} ${cityName || country}`, true, true);

  const container = document.getElementById('categories-container');
  container.innerHTML = '';

  CAT_ORDER.forEach(cat => {
    if (!categories[cat] || categories[cat].length === 0) return;
    const entries = categories[cat];

    const section = document.createElement('div');
    section.className = entries.length < 5 ? 'cat-section open' : 'cat-section';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-icon">${CAT_ICONS[cat] || '●'}</span>
      <span class="cat-title">${cat}</span>
      <span class="cat-count" style="margin-left:0.5rem">${entries.length}</span>
      <span class="cat-toggle">▾</span>`;
    header.addEventListener('click', () => section.classList.toggle('open'));

    const list = document.createElement('div');
    list.className = 'entries-list';
    entries.forEach(e => {
      const card = document.createElement('div');
      card.className = 'entry-card';
      const isCulture = cat === 'Culture';
      card.innerHTML = `
        <div class="entry-name">${e.name}</div>
        ${e.details ? `<div class="entry-details">${e.details}</div>` : ''}
        ${isCulture ? `<button class="entry-hours-btn" onclick="fetchHours(this, ${JSON.stringify(e.name)}, ${JSON.stringify(currentCity || '')}, ${JSON.stringify(currentCountry || '')})">🕐 Check opening hours</button>` : ''}
        <div class="entry-hours" style="display:none"></div>`;
      list.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(list);
    container.appendChild(section);
  });

  if (!isHomeDest) {
    showView('view-city');
  } else {
    // HK / NY: inject categories into La Recherche section-content
    const rechercheContent = document.querySelector('#recherche-block .section-content');
    let existing = rechercheContent ? rechercheContent.querySelector('.categories-inline') : document.getElementById('view-country').querySelector('.categories-inline');
    if (existing) existing.remove();
    const wrap = document.createElement('div');
    wrap.className = 'categories-inline';
    wrap.innerHTML = '';
    Array.from(container.children).forEach(child => wrap.appendChild(child.cloneNode(true)));
    // Re-attach accordion events on cloned nodes
    wrap.querySelectorAll('.cat-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
    });
    if (rechercheContent) {
      rechercheContent.appendChild(wrap);
    } else {
      document.getElementById('view-country').appendChild(wrap);
    }
    container.innerHTML = '';
  }
}

  <script>
  // ── Inbox helpers (localStorage) ─────────────────────────────────────────
  const INBOX_KEY = 'jm_travel_inbox';
  function getInbox() {
    try { return JSON.parse(localStorage.getItem(INBOX_KEY) || '[]'); } catch { return []; }
  }
  function saveInbox(items) {
    localStorage.setItem(INBOX_KEY, JSON.stringify(items));
  }

  function renderInbox() {
    const items = getInbox();
    // Show/hide inbox section on the home view
    let sec = document.getElementById('inbox-section');
    if (!sec) return;
    if (items.length === 0) { sec.classList.remove('has-items'); sec.innerHTML = ''; return; }
    sec.classList.add('has-items');
    sec.innerHTML = `
      <div class="inbox-header">
        📥 Inbox
        <span class="inbox-badge">${items.length}</span>
      </div>
      ${items.map((item, i) => `
        <div class="inbox-item">
          <div class="inbox-item-body">
            <div class="inbox-item-name">${item.name || '—'}</div>
            <div class="inbox-item-meta">${[item.country, item.city, item.category].filter(Boolean).join(' · ')}</div>
            ${item.details ? `<div class="inbox-item-details">${item.details}</div>` : ''}
          </div>
          <div class="inbox-item-actions">
            <button class="inbox-delete-btn" onclick="deleteInboxItem(${i})">Remove</button>
          </div>
        </div>`).join('')}`;
  }

  function deleteInboxItem(index) {
    const items = getInbox();
    items.splice(index, 1);
    saveInbox(items);
    renderInbox();
  }

  // ── Modal controls ───────────────────────────────────────────────────────
  function openAddVideo() {
    document.getElementById('av-overlay').classList.add('open');
    setTimeout(() => document.getElementById('av-url').focus(), 50);
  }
  function closeAddVideo() {
    document.getElementById('av-overlay').classList.remove('open');
    resetAnalysis();
  }
  function resetAnalysis() {
    document.getElementById('av-url').value = '';
    document.getElementById('av-status').textContent = '';
    document.getElementById('av-result').classList.remove('visible');
    document.getElementById('av-multi-results').classList.remove('visible');
    document.getElementById('av-multi-results').innerHTML = '';
    document.getElementById('av-btn').disabled = false;
    document.getElementById('av-img-btn').style.display = 'none';
    document.getElementById('av-previews').innerHTML = '';
    document.getElementById('av-preview-count').textContent = '';
    document.getElementById('av-file').value = '';
    document.getElementById('av-progress-wrap').classList.remove('visible');
    document.getElementById('av-progress-fill').style.width = '0%';
    clearInterval(_progressTimer);
    _images = [];
  }

  // ── Image compression ─────────────────────────────────────────────────────
  function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1024;
          let { width, height } = img;
          if (width > MAX || height > MAX) {
            if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
            else { width = Math.round(width * MAX / height); height = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
          resolve({ data: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Image selection ───────────────────────────────────────────────────────
  let _images = []; // [{data, mediaType}]
  const MAX_IMAGES = 10;

  async function onImagesSelected(e) {
    const files = Array.from(e.target.files);
    const status = document.getElementById('av-status');
    if (files.length > MAX_IMAGES) {
      status.textContent = `⚠️ ${files.length} selected — only the first ${MAX_IMAGES} will be analyzed.`;
    } else {
      status.textContent = '';
    }
    const limited = files.slice(0, MAX_IMAGES);
    _images = [];
    const previews = document.getElementById('av-previews');
    const countEl = document.getElementById('av-preview-count');
    previews.innerHTML = '';
    countEl.textContent = 'Compressing…';
    document.getElementById('av-img-btn').style.display = 'none';
    document.getElementById('av-multi-results').classList.remove('visible');

    _images = await Promise.all(limited.map(file => compressImage(file)));

    _images.forEach((img, i) => {
      const el = document.createElement('img');
      el.src = 'data:image/jpeg;base64,' + img.data;
      el.className = 'av-preview-thumb';
      el.title = limited[i].name;
      previews.appendChild(el);
    });

    countEl.textContent = `${limited.length} screenshot${limited.length > 1 ? 's' : ''} selected`;
    document.getElementById('av-img-btn').style.display = 'block';
  }

  // ── Progress bar helpers ──────────────────────────────────────────────────
  let _progressTimer = null;

  function startProgress(n) {
    const wrap  = document.getElementById('av-progress-wrap');
    const fill  = document.getElementById('av-progress-fill');
    const label = document.getElementById('av-progress-label');
    const pct   = document.getElementById('av-progress-pct');
    wrap.classList.add('visible');
    fill.style.width = '0%';

    const steps = [
      { p: 10, text: `Uploading ${n} screenshot${n > 1 ? 's' : ''}…` },
      { p: 30, text: 'Reading images…' },
      { p: 55, text: 'Extracting places…' },
      { p: 75, text: 'Merging duplicates…' },
      { p: 90, text: 'Almost done…' },
    ];
    let i = 0;
    const plane = document.getElementById('av-progress-plane');
    _progressTimer = setInterval(() => {
      if (i >= steps.length) { clearInterval(_progressTimer); return; }
      fill.style.width = steps[i].p + '%';
      if (plane) plane.style.left = `calc(${steps[i].p}% - 0.6rem)`;
      label.textContent = steps[i].text;
      pct.textContent = steps[i].p + '%';
      i++;
    }, 800);
  }

  function finishProgress(success) {
    clearInterval(_progressTimer);
    const fill  = document.getElementById('av-progress-fill');
    const label = document.getElementById('av-progress-label');
    const pct   = document.getElementById('av-progress-pct');
    fill.style.width = success ? '100%' : '0%';
    const plane = document.getElementById('av-progress-plane');
    if (plane) plane.style.left = success ? 'calc(100% - 0.6rem)' : '0%';
    label.textContent = success ? 'Done!' : '';
    pct.textContent   = success ? '100%' : '';
    if (!success) document.getElementById('av-progress-wrap').classList.remove('visible');
  }

  // ── Analyze image(s) ─────────────────────────────────────────────────────
  async function analyzeImage() {
    if (!_images.length) return;
    const btn = document.getElementById('av-img-btn');
    const status = document.getElementById('av-status');
    btn.disabled = true;
    const n = _images.length;
    status.textContent = '';
    document.getElementById('av-multi-results').classList.remove('visible');
    startProgress(n);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: _images })
      });
      const data = await res.json();

      if (data.error) { finishProgress(false); status.textContent = `⚠️ ${data.message || data.error}`; btn.disabled = false; return; }

      const raw_results = data.results || [];
      // Deduplicate by name within the returned results
      const norm = s => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      const seen = {};
      const results = raw_results.filter(item => {
        const key = norm(item.name);
        if (seen[key]) {
          if (item.details && item.details !== seen[key].details) {
            seen[key].details = [seen[key].details, item.details].filter(Boolean).join(' · ');
          }
          return false;
        }
        seen[key] = item;
        return true;
      });

      if (results.length === 0) {
        finishProgress(false);
        status.textContent = '⚠️ No travel info found in these screenshots.';
        btn.disabled = false;
        return;
      }

      const container = document.getElementById('av-multi-results');
      container.innerHTML = results.map((item, i) => `
        <div class="av-multi-item">
          <input type="checkbox" id="av-chk-${i}" checked>
          <div class="av-multi-item-body">
            <div class="av-multi-item-name">${item.name || '—'}</div>
            <div class="av-multi-item-meta">${[item.country, item.city, item.category].filter(Boolean).join(' · ')}</div>
            ${item.details ? `<div style="font-size:0.75rem;color:var(--text2);margin-top:0.15rem">${item.details}</div>` : ''}
          </div>
        </div>`).join('') +
        `<div class="av-actions" style="margin-top:0.8rem">
          <button class="av-cancel-btn" onclick="resetAnalysis()">Clear</button>
          <button class="av-save-all-btn" onclick="saveAllToTravel(${JSON.stringify(results).replace(/"/g, '&quot;')})">Save Selected</button>
        </div>`;
      container.classList.add('visible');
      finishProgress(true);
      status.textContent = `✅ Found ${results.length} place${results.length > 1 ? 's' : ''} — review and save.`;
      btn.disabled = false;
    } catch (e) {
      finishProgress(false);
      status.textContent = '❌ Request failed. Check your connection and try again.';
      btn.disabled = false;
    }
  }

  // ── Fuzzy name match ──────────────────────────────────────────────────────
  function _namesMatch(a, b) {
    const words = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 2);
    const wa = new Set(words(a));
    const wb = words(b);
    if (wa.size === 0 || wb.length === 0) return false;
    const shared = wb.filter(w => wa.has(w)).length;
    // Match if >50% of the shorter name's words are shared
    return shared / Math.min(wa.size, wb.length) >= 0.6;
  }

  // ── Core: insert one entry into TRAVEL (no persistence) ─────────────────
  function _insertIntoTravel(item) {
    const country  = (item.country || '').trim();
    const city     = (item.city    || 'General').trim();
    const category = item.category || 'Miscellaneous';
    const entry    = { name: item.name || '—', details: item.details || '' };

    if (!TRAVEL[country]) {
      TRAVEL[country] = { flag: '🏳️', center: [0, 0], zoom: 5, cities: [] };
    }
    let cityObj = TRAVEL[country].cities.find(c => c.name === city);
    if (!cityObj) {
      cityObj = { name: city, coords: [0, 0], categories: {} };
      TRAVEL[country].cities.push(cityObj);
    }
    if (!cityObj.categories[category]) cityObj.categories[category] = [];

    const existing = cityObj.categories[category].find(e => _namesMatch(e.name, entry.name));
    if (existing) {
      if (entry.details && entry.details !== existing.details) {
        existing.details = [existing.details, entry.details].filter(Boolean).join(' · ');
      }
    } else {
      cityObj.categories[category].push(entry);
    }
  }

  // ── Insert + persist ──────────────────────────────────────────────────────
  function insertIntoTravel(item) {
    _insertIntoTravel(item);
    persistUserEntry(item);
  }

  // ── Save selected screenshot results into TRAVEL ──────────────────────────
  async function saveAllToTravel(results) {
    const checked = results.filter((_, i) => {
      const chk = document.getElementById(`av-chk-${i}`);
      return chk && chk.checked;
    });
    if (checked.length === 0) return;

    // Check for new countries
    const newCountries = [...new Set(checked.map(i => i.country).filter(c => c && !TRAVEL[c]))];
    if (newCountries.length > 0) {
      const names = newCountries.join(', ');
      const ok = confirm(`"${names}" is not in your travel list yet. Create it?`);
      if (!ok) return;
    }

    checked.forEach(item => insertIntoTravel(item));
    buildHome();
    closeAddVideo();

    const status = document.getElementById('av-status');
    status.textContent = `✅ ${checked.length} place${checked.length > 1 ? 's' : ''} added.`;
  }

  // ── Save single URL result into TRAVEL ───────────────────────────────────
  async function saveToTravel() {
    const item = {
      name:     document.getElementById('av-name').value.trim(),
      country:  document.getElementById('av-country').value.trim(),
      city:     document.getElementById('av-city').value.trim(),
      category: document.getElementById('av-category').value,
      details:  document.getElementById('av-details').value.trim()
    };
    if (!item.name) { alert('Please fill in the Name field before saving.'); return; }

    if (item.country && !TRAVEL[item.country]) {
      const ok = confirm(`"${item.country}" is not in your travel list yet. Create it?`);
      if (!ok) return;
    }

    insertIntoTravel(item);
    buildHome();
    closeAddVideo();
  }

  // ── Analyze ──────────────────────────────────────────────────────────────
  async function analyzeVideo() {
    const url = document.getElementById('av-url').value.trim();
    if (!url) { document.getElementById('av-status').textContent = 'Please paste a URL first.'; return; }

    const btn = document.getElementById('av-btn');
    const status = document.getElementById('av-status');
    btn.disabled = true;
    status.textContent = '⏳ Fetching and analyzing…';
    document.getElementById('av-result').classList.remove('visible');

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (data.error) {
        const noMeta = ['no_metadata', 'url_blocked', 'url_unreachable', 'no_travel_info'].includes(data.error);
        status.innerHTML = `⚠️ ${data.message || data.error}${noMeta ? ' <span style="color:var(--copper);cursor:pointer;text-decoration:underline" onclick="document.getElementById(\'av-file\').click()">Upload screenshot →</span>' : ''}`;
        btn.disabled = false;
        return;
      }

      // Multi-result path (blogs, journals, and all URLs now return {results:[...]})
      const results = data.results;
      if (Array.isArray(results)) {
        const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
        const seen = {};
        const deduped = results.filter(item => {
          const key = norm(item.name || '');
          if (seen[key]) return false;
          seen[key] = true;
          return true;
        });
        const container = document.getElementById('av-multi-results');
        container.innerHTML = deduped.map((item, i) => `
          <div class="av-multi-item">
            <input type="checkbox" id="av-chk-${i}" checked>
            <div class="av-multi-item-body">
              <div class="av-multi-item-name">${item.name || '—'}</div>
              <div class="av-multi-item-meta">${[item.country, item.city, item.category].filter(Boolean).join(' · ')}</div>
              ${item.details ? `<div style="font-size:0.75rem;color:var(--text2);margin-top:0.15rem">${item.details}</div>` : ''}
            </div>
          </div>`).join('') +
          `<div class="av-actions" style="margin-top:0.8rem">
            <button class="av-cancel-btn" onclick="resetAnalysis()">Clear</button>
            <button class="av-save-all-btn" onclick="saveAllToTravel(${JSON.stringify(deduped).replace(/"/g, '&quot;')})">Save Selected</button>
          </div>`;
        container.classList.add('visible');
        status.textContent = `✅ Found ${deduped.length} place${deduped.length !== 1 ? 's' : ''} — review and save.`;
        btn.disabled = false;
        return;
      }

      status.textContent = '❌ Unexpected response. Please try again.';
      btn.disabled = false;
    } catch (e) {
      status.textContent = '❌ Request failed. Check your connection and try again.';
      btn.disabled = false;
    }
  }

  // ── Save to inbox ────────────────────────────────────────────────────────
  function saveToInbox() {
    const entry = {
      name:     document.getElementById('av-name').value.trim(),
      country:  document.getElementById('av-country').value.trim(),
      city:     document.getElementById('av-city').value.trim(),
      category: document.getElementById('av-category').value,
      details:  document.getElementById('av-details').value.trim(),
      addedAt:  new Date().toISOString(),
      source:   document.getElementById('av-url').value.trim()
    };
    if (!entry.name) { alert('Please fill in the Name field before saving.'); return; }
    const items = getInbox();
    items.unshift(entry);
    saveInbox(items);
    renderInbox();
    closeAddVideo();
  }

  // Close overlay when clicking the backdrop
  document.getElementById('av-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeAddVideo();
  });

  // Render inbox whenever the home view becomes visible
  const _origShowView = showView;
  showView = function(viewId) {
    _origShowView(viewId);
    if (viewId === 'view-home') setTimeout(renderInbox, 50);
  };
  </script>


  <script>
  // ── PWA Service Worker ────────────────────────────────────────────────────
  // ── Opening hours lookup ──────────────────────────────────────────────────
  async function fetchHours(btn, name, city, country) {
    const hoursEl = btn.nextElementSibling;
    btn.textContent = '⏳ Looking up…';
    btn.disabled = true;

    try {
      const res = await fetch('/api/hours', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, city, country })
      });
      const data = await res.json();

      if (!data.hours && data.confidence === 'low') {
        btn.textContent = '🕐 Hours not found';
        btn.disabled = false;
        return;
      }

      btn.style.display = 'none';
      hoursEl.style.display = 'block';
      hoursEl.innerHTML = `
        ${data.hours ? `<div class="entry-hours-row"><span class="entry-hours-label">Open</span><span class="entry-hours-val">${data.hours}</span></div>` : ''}
        ${data.closed ? `<div class="entry-hours-row"><span class="entry-hours-label">Closed</span><span class="entry-hours-val entry-hours-closed">${data.closed}</span></div>` : ''}
        ${data.notes ? `<div class="entry-hours-note">ℹ️ ${data.notes}</div>` : ''}
        <div class="entry-hours-disclaimer">⚠️ Verify before visiting — hours may have changed.</div>`;
    } catch (e) {
      btn.textContent = '🕐 Check opening hours';
      btn.disabled = false;
    }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── Share Target handler ──────────────────────────────────────────────────
  // When the app is opened via the iOS/Android share sheet, the shared URL
  // arrives as ?share-url=... or embedded in ?share-text=...
  (function handleShareTarget() {
    const params = new URLSearchParams(window.location.search);
    const sharedUrl  = params.get('share-url')  || '';
    const sharedText = params.get('share-text')  || '';
    const sharedTitle = params.get('share-title') || '';

    // Extract the first URL found in text or url params
    const urlRegex = /https?:\/\/[^\s"'<>)]+/;
    const extracted = sharedUrl || sharedText.match(urlRegex)?.[0] || '';

    if (extracted) {
      // Clean the URL from the address bar so Back works cleanly
      history.replaceState({}, '', '/');

      // Wait for the app to finish rendering, then auto-open the analysis modal
      const tryOpen = (attempts) => {
        const urlInput = document.getElementById('av-url');
        if (urlInput) {
          urlInput.value = extracted;
          openAddVideo();
          // Auto-trigger analysis after a short delay so the modal is visible
          setTimeout(analyzeVideo, 400);
        } else if (attempts > 0) {
          setTimeout(() => tryOpen(attempts - 1), 200);
        }
      };
      // Try up to 20 times (4 seconds) waiting for the DOM
      setTimeout(() => tryOpen(20), 300);
    }
  })();
  </script>
